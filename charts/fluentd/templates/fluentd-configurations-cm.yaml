{{- if not .Values.extraFilesConfigMapNameOverride }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config-{{ include "fluentd.shortReleaseName" . }}
  labels:
    {{- include "fluentd.labels" . | nindent 4 }}
data:
{{- range $key, $value := .Values.fileConfigs }}
  {{$key }}: |-
    {{- $value | nindent 4 }}
{{- end }}
{{- if .Values.tenx.enabled }}
{{- range $key, $value := .Values.tenx.fileConfigs }}
{{- if ne $key "TenXLogs" }}
{{- if and (not (eq $key "00_tenx_optimize.conf")) (not (eq $key "00_tenx_regulate.conf")) }}
  {{$key }}: |-
    {{- $value | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- /*
  NOTE: the optimize path deliberately reuses 00_tenx_regulate.conf.
  tenx.optimize=true used to route here to 00_tenx_optimize.conf,
  which @includes tenx-optimize-unix.conf. That conf file is NOT
  shipped in log10x/fluentd-10x:1.0.7-jit — only tenx-regulate-unix.conf,
  tenx-regulate-stdio.conf, and tenx-report.conf are present — so the
  optimize=true path fails fluentd startup with a missing-include error.

  The regulator conf is sufficient — optimize mode is triggered by
  setting `regulatorOptimize=true` on the pod env (see _pod.tpl /
  deployment template), which the engine reads via TenXEnv.get(...) in
  pipelines/run/input/forwarder/fluentd/regulate/config.yaml to flip
  encodeObjects=true. Same pattern as the fluent-bit chart.
*/}}
  00_tenx.conf: |-
    {{- (index .Values.tenx.fileConfigs "00_tenx_regulate.conf") | nindent 4 }}
{{- range $key, $value := .Values.tenx.outputConfigs }}
{{- if or $.Values.tenx.optimize (not (contains "templates" $key)) }}
  {{$key }}: |-
    {{- $value | nindent 4 }}
{{- end }}
{{- end }}
{{- range $key, $value := .Values.tenx.fileConfigs.TenXLogs }}
  {{$key }}: |-
    {{- $value | nindent 4 }}
{{- end }}
{{- else }}
{{- range $key, $value := .Values.originalFluentOutput }}
  {{$key }}: |-
    {{- $value | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}

{{- if not .Values.mainConfigMapNameOverride }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-main-{{ include "fluentd.shortReleaseName" . }}
  labels:
    {{- include "fluentd.labels" . | nindent 4 }}
data:
  fluent.conf: |-
    # do not collect fluentd logs to avoid infinite loops.
    <label @FLUENT_LOG>
      <match **>
        @type null
        @id ignore_fluent_logs
      </match>
    </label>

    @include config.d/*.conf
    {{- range $key := .Values.configMapConfigs }}
    {{- print "@include " $key ".d/*"  | nindent 4 }}
    {{- end }}
{{- end }}