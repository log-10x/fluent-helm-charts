# Sample values.yaml for deploying an 10x receiver with fluentd
#
# Make sure to add your 10x license, as well as setup your backend info
# in the outputConfigs section.
#
# For more info on deploying, see -
# https://doc.log10x.com/apps/receiver/deploy/#fluentd
#
tenx:
  license: "<YOUR-10X-LICENSE-HERE>"


  runtimeName: "my-fluentd-receiver"

  fileConfigs:
    # Edit this section to scope which events the 10x Receiver filters.
    # Defaults to passing all events to 10x.
    #
    04_outputs.conf: |-
      <label @OUTPUT>
        <match **>
          @type relabel
          @label @TENX
        </match>
      </label>
    #
    # Example of only passing some events:
    #
    # 04_outputs.conf: |-
    #   <label @OUTPUT>
    #     <match Some.Tag.To.Filter>
    #       @type relabel
    #       @label @TENX
    #     </match>
    #     <match **>
    #       @type relabel
    #       @label @FINAL-OUTPUT
    #     </match>
    #   </label>

  outputConfigs:
    06_final_output.conf: |-
      <label @FINAL-OUTPUT>
        <match **>
          @type elasticsearch
          host "elasticsearch-master"
          port 9200
          path ""
          user elastic
          password changeme
        </match>
      </label>

    08_tenx_internal.conf: |-
      <label @TENX-INTERNAL>
        <match **>
          @type elasticsearch
          host "elasticsearch-master"
          port 9200
          path ""
          user elastic
          password changeme

          index_name tenx-internal
        </match>
      </label>
